name: Build Tailscale Router IPQ64 Binary

"on":
  workflow_dispatch:
    inputs:
      version:
        description: "Tailscale version tag, example: v1.98.4. Empty means latest Linux arm64 stable package."
        required: false
        default: ""
      force_rebuild:
        description: "Rebuild even if release already exists"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "00 06 * * *"

permissions:
  contents: write

concurrency:
  group: tailscale-router-ipq64-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      INPUT_VER: "${{ github.event.inputs.version || '' }}"
      FORCE_REBUILD: "${{ github.event.inputs.force_rebuild || 'false' }}"
      GH_REPO: "${{ github.repository }}"

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Decide Tailscale Linux arm64 version
        id: ver
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "$INPUT_VER" ]; then
            VER="$INPUT_VER"
            case "$VER" in
              v*) ;;
              *) VER="v${VER}" ;;
            esac
          else
            VER_NUM="$(curl -fsSL https://pkgs.tailscale.com/stable/ \
              | grep -oE 'tailscale_[0-9]+\.[0-9]+\.[0-9]+_arm64\.tgz' \
              | sed -E 's/tailscale_([0-9]+\.[0-9]+\.[0-9]+)_arm64\.tgz/\1/' \
              | sort -V \
              | tail -n1)"

            VER="v${VER_NUM}"
          fi

          REL_TAG="router-${VER}"

          echo "ver=${VER}" >> "$GITHUB_OUTPUT"
          echo "rel_tag=${REL_TAG}" >> "$GITHUB_OUTPUT"

          echo "Tailscale Linux arm64 version: ${VER}"
          echo "Release tag: ${REL_TAG}"

      - name: Check whether release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          REL_TAG="${{ steps.ver.outputs.rel_tag }}"

          if gh release view "$REL_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            if [ "$FORCE_REBUILD" = "true" ]; then
              echo "Release exists, but force_rebuild=true. Continue."
              echo "build=true" >> "$GITHUB_OUTPUT"
              echo "delete_old=true" >> "$GITHUB_OUTPUT"
            else
              echo "Release already exists: $REL_TAG. Skip build."
              echo "build=false" >> "$GITHUB_OUTPUT"
              echo "delete_old=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Release does not exist. Continue."
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "delete_old=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if already built
        if: steps.check_release.outputs.build == 'false'
        shell: bash
        run: |
          echo "No new version to build."

      - name: Install build tools
        if: steps.check_release.outputs.build == 'true'
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y git curl ca-certificates build-essential file

          sudo apt-get install -y upx-ucl || sudo apt-get install -y upx

      - name: Clone Tailscale source
        if: steps.check_release.outputs.build == 'true'
        shell: bash
        run: |
          set -euo pipefail

          rm -rf tailscale
          git clone --depth 1 --branch "${{ steps.ver.outputs.ver }}" \
            https://github.com/tailscale/tailscale.git tailscale

      - name: Set up Go
        if: steps.check_release.outputs.build == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: tailscale/go.mod
          check-latest: true
          cache: true
          cache-dependency-path: tailscale/go.sum

      - name: Build arm64 combined binary
        if: steps.check_release.outputs.build == 'true'
        shell: bash
        working-directory: tailscale
        run: |
          set -euo pipefail

          eval "$(./build_dist.sh shellvars)"

          TAGS="ts_omit_aws,ts_omit_bird,ts_omit_tap,ts_omit_kube,ts_omit_completion,ts_include_cli,ts_omit_systray,ts_omit_tpm,ts_omit_debugeventbus,ts_omit_syspolicy,ts_omit_capture,ts_omit_ssh,ts_omit_taildrop,ts_omit_gro"

          echo "Build version long: ${VERSION_LONG}"
          echo "Build version short: ${VERSION_SHORT}"
          echo "Build tags: ${TAGS}"

          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 GOARM64=v8.0 \
          go build -trimpath \
            -tags "$TAGS" \
            -ldflags "-s -w -X tailscale.com/version.longStamp=${VERSION_LONG} -X tailscale.com/version.shortStamp=${VERSION_SHORT}" \
            -o tailscale.combined \
            ./cmd/tailscaled

          file tailscale.combined
          go version -m tailscale.combined | tee buildinfo.txt

      - name: Compress with UPX
        if: steps.check_release.outputs.build == 'true'
        shell: bash
        working-directory: tailscale
        run: |
          set -euo pipefail

          upx --lzma --best tailscale.combined
          upx -t tailscale.combined
          upx -l tailscale.combined | tee upx-info.txt

          mkdir -p dist

          cp tailscale.combined "dist/tailscale.combined"
          cp buildinfo.txt "dist/buildinfo.txt"
          cp upx-info.txt "dist/upx-info.txt"

          cd dist
          md5sum tailscale.combined > tailscale.combined.md5

          ls -lh

      - name: Upload artifact
        if: steps.check_release.outputs.build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tailscale-router-ipq64-${{ steps.ver.outputs.ver }}-arm64
          path: tailscale/dist/*

      - name: Delete old release when force rebuilding
        if: steps.check_release.outputs.build == 'true' && steps.check_release.outputs.delete_old == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          REL_TAG="${{ steps.ver.outputs.rel_tag }}"
          gh release delete "$REL_TAG" --repo "$GH_REPO" --yes --cleanup-tag

      - name: Create GitHub Release
        if: steps.check_release.outputs.build == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          VER="${{ steps.ver.outputs.ver }}"
          REL_TAG="${{ steps.ver.outputs.rel_tag }}"

          cat > RELEASE_NOTES.md <<EOF
          Tailscale ${VER} 路由器自定义构建，目标平台为 koolshare / ASUS IPQ64 / arm64。

          ## 构建说明

          - 目标系统：linux/arm64
          - 构建模式：tailscale + tailscaled combined
          - 压缩方式：UPX --lzma --best
          - 版本来源：Tailscale 官方 Linux arm64 stable 包
          - 兼容目标：koolshare Tailscale 插件 combined 二进制结构
          - 额外处理：加入 ts_omit_gro，用于规避部分 IPQ5332 / Linux 5.4 环境下的 invertGSOChecksum panic

          ## 文件说明

          - tailscale.combined：路由器使用的 UPX 压缩版二进制
          - tailscale.combined.md5：路由器端 MD5 校验文件
          - buildinfo.txt：Go 构建信息
          - upx-info.txt：UPX 压缩信息

          ## 路由器端校验

          下载 tailscale.combined 和 tailscale.combined.md5 后，在路由器上执行：

          ```sh
          cd /tmp
          md5sum -c tailscale.combined.md5
          ```

          正常输出：

          ```text
          tailscale.combined: OK
          ```

          ## 注意事项

          本 Release 为非官方构建，不属于 Tailscale 官方发布渠道。更新前建议备份原有 /koolshare/bin/tailscale* 文件。
          EOF

          sed -i 's/^          //' RELEASE_NOTES.md

          gh release create "$REL_TAG" tailscale/dist/* \
            --repo "$GH_REPO" \
            --title "Tailscale Router IPQ64 ${VER} arm64 combined" \
            --notes-file RELEASE_NOTES.md
